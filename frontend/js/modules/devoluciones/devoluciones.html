<!-- devoluciones.html -->
<div class="content-section active" id="section-devoluciones">

    <!-- Header -->
    <div class="section-header">
        <h2 class="section-title"><i class="fas fa-undo-alt"></i> Devoluciones</h2>
        <div style="display:flex; gap:0.5rem;">
            <button class="btn btn-primary" id="btn-dev-venta"
                onclick="window.devoluciones_module.mostrarModalDevolucionVenta()">
                <i class="fas fa-shopping-cart"></i> Dev. de Venta
            </button>
            <button class="btn btn-secondary" id="btn-dev-compra"
                onclick="window.devoluciones_module.mostrarModalDevolucionCompra()">
                <i class="fas fa-box"></i> Dev. de Compra
            </button>
        </div>
    </div>

    <!-- KPIs -->
    <div class="grid-3" style="margin-bottom:1.5rem;">
        <div class="kpi-card">
            <div class="kpi-icon"><i class="fas fa-dollar-sign"></i></div>
            <div class="kpi-info">
                <span class="kpi-label">Monto Devuelto</span>
                <span class="kpi-value" id="total-devuelto-mes">$0</span>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon"><i class="fas fa-exchange-alt"></i></div>
            <div class="kpi-info">
                <span class="kpi-label">Total Devoluciones</span>
                <span class="kpi-value" id="total-devoluciones">0</span>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon"><i class="fas fa-box"></i></div>
            <div class="kpi-info">
                <span class="kpi-label">Más Devuelto</span>
                <span class="kpi-value" id="producto-mas-devuelto" style="font-size:14px;">-</span>
            </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card" style="margin-bottom:1rem;">
        <div class="card-header" style="margin-bottom:0.75rem; padding-bottom:0.75rem;">
            <span class="card-title">Filtros</span>
            <div style="display:flex; gap:0.5rem;">
                <button class="btn btn-primary btn-sm" onclick="window.devoluciones_module.aplicarFiltros()">
                    <i class="fas fa-search"></i> Buscar
                </button>
                <button class="btn btn-secondary btn-sm" onclick="window.devoluciones_module.limpiarFiltros()">
                    <i class="fas fa-times"></i> Limpiar
                </button>
            </div>
        </div>
        <div class="grid-4" style="gap:0.75rem;">
            <div class="form-group" style="margin-bottom:0;">
                <label>Tipo</label>
                <select class="form-control" id="filtro-tipo">
                    <option value="">Todos</option>
                    <option value="venta">Devolución de Venta</option>
                    <option value="compra">Devolución de Compra</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label>Estado</label>
                <select class="form-control" id="filtro-estado">
                    <option value="">Todos</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="aprobada">Aprobada</option>
                    <option value="rechazada">Rechazada</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label>Motivo</label>
                <select class="form-control" id="filtro-motivo">
                    <option value="">Todos</option>
                    <option value="producto_defectuoso">Producto Defectuoso</option>
                    <option value="producto_equivocado">Producto Equivocado</option>
                    <option value="no_deseado">No Deseado</option>
                    <option value="exceso_de_pedido">Exceso de Pedido</option>
                    <option value="mal_estado">Mal Estado</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label>Buscar</label>
                <input type="text" class="form-control" id="filtro-busqueda"
                    placeholder="Código o cliente/proveedor...">
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="card">
        <div class="card-header" style="margin-bottom:0.75rem; padding-bottom:0.75rem;">
            <span class="card-title">Lista de Devoluciones</span>
        </div>
        <div class="table-container">
            <table class="data-table" id="tabla-devoluciones">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Tipo</th>
                        <th>Referencia</th>
                        <th>Fecha</th>
                        <th>Motivo</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
