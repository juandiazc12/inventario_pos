<!-- resumenes.html -->
<div class="content-section active" id="section-resumenes">
    <div class="section-header">
        <h2 class="section-title"><i class="fas fa-chart-bar"></i> Resúmenes</h2>
        <button class="btn btn-secondary" onclick="API.download('/resumenes/exportar','productos.csv')">
            <i class="fas fa-file-csv"></i> Exportar Productos CSV
        </button>
    </div>

    <div class="grid-3" style="margin-bottom:1.5rem">
        <div class="card card-premium" id="res-diario">
            <div class="card-header"><span class="card-title"><i class="fas fa-calendar-day"></i> Hoy</span></div>
            <div class="card-body" id="res-diario-body">
                <div class="loading-screen" style="min-height:80px"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </div>
        <div class="card card-premium" id="res-semanal">
            <div class="card-header"><span class="card-title"><i class="fas fa-calendar-week"></i> Esta Semana</span>
            </div>
            <div class="card-body" id="res-semanal-body">
                <div class="loading-screen" style="min-height:80px"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </div>
        <div class="card card-premium" id="res-mensual">
            <div class="card-header"><span class="card-title"><i class="fas fa-calendar-alt"></i> Este Mes</span></div>
            <div class="card-body" id="res-mensual-body">
                <div class="loading-screen" style="min-height:80px"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </div>
    </div>

</div>
</div>

<div class="card card-premium" style="margin-bottom:1.5rem">
    <div class="card-header" style="flex-wrap:wrap;gap:1rem">
        <span class="card-title"><i class="fas fa-shopping-bag"></i> Ventas Recientes</span>
        <div style="display:flex;gap:0.5rem;align-items:center;margin-left:auto">
            <div class="search-group-premium" style="width:200px">
                <input type="text" id="ventas-busqueda" class="form-control-premium" placeholder="Buscar venta...">
                <i class="fas fa-search"></i>
            </div>
            <select class="form-control form-control-premium" id="ventas-limite"
                style="width:auto;padding:0.3rem;font-size:0.8rem">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
    </div>
    <div class="card-body" style="padding:0">
        <div class="table-scroll">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Ticket</th>
                        <th>Vendedor</th>
                        <th>Estado</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="ventas-recientes-tbody">
                    <tr>
                        <td colspan="6" class="text-center" style="padding:1.5rem;color:var(--text-muted)">Cargando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="ventas-pagination" class="pagination"
            style="padding:1rem;justify-content:flex-end;border-top:1px solid var(--border)"></div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <span class="card-title"><i class="fas fa-trophy"></i> Top 10 Más Vendidos</span>
        <select class="form-control" id="mas-vendidos-periodo"
            style="width:auto;padding:0.3rem 0.5rem;font-size:0.8rem">
            <option value="mes">Este mes</option>
            <option value="semana">Esta semana</option>
            <option value="dia">Hoy</option>
        </select>
    </div>
    <div class="card-body" style="padding:0">
        <div class="table-scroll">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Producto</th>
                        <th>Código</th>
                        <th>Unidades Vendidas</th>
                        <th>Total Ingresos</th>
                    </tr>
                </thead>
                <tbody id="mas-vendidos-tbody"></tbody>
            </table>
        </div>
    </div>
</div>
</div>
