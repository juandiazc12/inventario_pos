<!-- clientes.html -->
<div class="content-section active" id="section-clientes">
    <div class="section-header">
        <h2 class="section-title"><i class="fas fa-users"></i> Clientes</h2>
        <button class="btn btn-primary" id="btn-nuevo-cliente"><i class="fas fa-plus"></i> Nuevo Cliente</button>
    </div>
    <div class="toolbar">
        <div class="search-bar"><i class="fas fa-search"></i><input type="text" class="form-control" id="cliente-search"
                placeholder="Buscar..."></div>
    </div>
    <div class="table-wrapper" id="clientes-table-container">
        <div class="table-scroll">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Documento</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="clientes-tbody"></tbody>
            </table>
        </div>
        <div class="pagination-wrapper"></div>
    </div>
</div>
