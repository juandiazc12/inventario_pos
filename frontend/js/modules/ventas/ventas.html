<!-- ventas.html -->
<div class="content-section active" id="section-ventas">
    <div class="section-header">
        <h2 class="section-title"><i class="fas fa-cash-register"></i> Punto de Venta (POS)</h2>
    </div>

    <div class="grid-2">
        <!-- Panel Izquierdo: Buscador y Producto Actual -->
        <div class="card">
            <div class="card-header"><span class="card-title">Buscar Producto</span></div>
            <div class="card-body">
                <!-- Selección de Cliente (Ahora al inicio) -->
                <div class="form-group">
                    <label>Cliente <span style="color: var(--danger);">* Obligatorio</span></label>
                    <div style="position:relative;">
                        <input type="text" class="form-control" id="v-cliente-search"
                            placeholder="Escribe el nombre del cliente..." autocomplete="off">
                        <input type="hidden" id="v-cliente-id">
                        <div id="v-cliente-results" class="search-results-overlay" style="display:none;"></div>
                    </div>
                </div>

                <div class="form-group"
                    style="border-top: 1px solid var(--border); padding-top: 1.5rem; margin-top: 1.5rem;">
                    <label>Escanear QR/Barra o Buscar Producto</label>
                    <div class="qr-input-group">
                        <input type="text" class="form-control" id="v-search"
                            placeholder="Escanea QR/Barra o busca producto..." autocomplete="off">
                        <button type="button" class="btn-qr" onclick="QRScanner.open('v-search')"
                            title="Escanear Código">
                            <i class="fas fa-qrcode"></i>
                        </button>
                    </div>
                    <!-- Resultados de búsqueda rápida -->
                    <div id="v-search-results" style="display:none;"></div>
                </div>

                <!-- Visualización del Producto Escaneado -->
                <div id="v-producto-preview"
                    style="display:none; text-align:center; padding:1.5rem; background:var(--bg-tertiary); border-radius:var(--radius-md); margin-top:1.5rem;">
                    <img id="v-prod-img" src="" alt="Producto"
                        style="width:120px; height:120px; object-fit:cover; border-radius:var(--radius-sm); margin-bottom:1rem; box-shadow:var(--shadow-sm);">
                    <h3 id="v-prod-nombre" style="margin:0 0 0.5rem 0; font-size:1.1rem;">Nombre del Producto</h3>
                    <div
                        style="display:flex; justify-content:center; gap:1.5rem; margin-bottom:1rem; font-size:0.9rem;">
                        <span class="badge info">Stock: <b id="v-prod-stock">0</b></span>
                        <span class="badge success">Precio: <b id="v-prod-precio">$0</b></span>
                    </div>

                    <div class="form-grid"
                        style="grid-template-columns: 1fr 1fr; gap:0.5rem; max-width:200px; margin:0 auto;">
                        <div class="form-group" style="margin:0;">
                            <label style="font-size:0.8rem">Cantidad</label>
                            <input type="number" class="form-control" id="v-cantidad" min="1" value="1"
                                style="text-align:center">
                        </div>
                        <div class="form-group" style="margin:0;">
                            <label style="font-size:0.8rem">Acción</label>
                            <button class="btn btn-primary btn-full" id="btn-add-cart"
                                style="height:38px; display:flex; align-items:center; justify-content:center;">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Panel Derecho: Carrito de Compras -->
        <div class="card" style="display:flex; flex-direction:column; height:calc(100vh - 180px);">
            <div class="card-header" style="justify-content:space-between;">
                <span class="card-title">Carrito de Compras</span>
                <span class="badge warning" id="cart-count">0 items</span>
            </div>

            <!-- Indicador de Cliente Actual -->
            <div id="v-current-cliente-display" class="v-client-banner">
                <i class="fas fa-user-tag"></i>
                <span>Cliente: <strong id="v-selected-cliente-name">No seleccionado</strong></span>
            </div>

            <div class="card-body" style="flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0;">

                <!-- Tabla con scroll propio -->
                <div class="table-scroll" style="flex:1; overflow-y:auto;">
                    <table class="data-table" style="width:100%;">
                        <thead style="position:sticky; top:0; z-index:10;">
                            <tr>
                                <th>Prod</th>
                                <th style="width:60px; text-align:center;">Cant</th>
                                <th style="text-align:right;">Subtotal</th>
                                <th style="width:40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="cart-tbody">
                            <tr>
                                <td colspan="4" class="text-center" style="padding:2rem;">El carrito está vacío</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pie de página fijo -->
                <div style="background:var(--bg-tertiary); padding:1.5rem; border-top:1px solid var(--border);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <span style="font-size:1.1rem; font-weight:600;">Total a Pagar:</span>
                        <span style="font-size:1.5rem; font-weight:700; color:var(--success-color);"
                            id="cart-total">$0</span>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.75rem;">
                        <button class="btn btn-secondary" onclick="ventas_module.guardarPedido()">
                            <i class="fas fa-save"></i> Guardar Pedido
                        </button>
                        <button class="btn btn-success" id="btn-finalizar-venta"
                            onclick="ventas_module.finalizarVenta()" disabled>
                            <i class="fas fa-check-circle"></i> Cobrar
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
